AWSTemplateFormatVersion: "2010-09-09"
Description: "Lambda functions for ETL pipeline triggered by S3 uploads"

Parameters:
  DataLakeBucketName:
    Type: String
    Description: "Name of the existing S3 data lake bucket"

Resources:
  # ---- IAM Role for Lambda ----
  LoanETLRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LoanETLRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${DataLakeBucketName}
                  - !Sub arn:aws:s3:::${DataLakeBucketName}/*

  # ---- Bronze Lambda ----
  BronzeLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "lambda_transform_bronze_to_silver"
      Handler: index.handler
      Runtime: python3.9                                                                                                 
      Timeout: 120
      Role: !GetAtt LoanETLRole.Arn
      Code:
        S3Bucket: !Ref DataLakeBucketName
        S3Key: pipeline/lambda_transform_bronze_to_silver.zip
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataLakeBucketName
          INPUT_PREFIX: data/bronze/
          OUTPUT_PREFIX: data/silver/

  # ---- Silver Lambda ----
  SilverLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "lambda_transform_silver_to_gold"
      Handler: index.handler
      Runtime: python3.9
      Timeout: 120
      Role: !GetAtt LoanETLRole.Arn
      Code:
        S3Bucket: !Ref DataLakeBucketName
        S3Key: pipeline/lambda_transform_silver_to_gold.zip
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataLakeBucketName
          INPUT_PREFIX: data/silver/
          OUTPUT_PREFIX: data/gold/

  # ---- Permissions for S3 to invoke Lambdas ----
  BronzeInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BronzeLambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "s3.amazonaws.com"
      SourceArn: !Sub "arn:aws:s3:::${DataLakeBucketName}"

  SilverInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SilverLambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "s3.amazonaws.com"
      SourceArn: !Sub "arn:aws:s3:::${DataLakeBucketName}"

Outputs:
  BronzeLambdaArn:
    Description: "ARN of Bronze Lambda Function"
    Value: !GetAtt BronzeLambdaFunction.Arn

  SilverLambdaArn:
    Description: "ARN of Silver Lambda Function"
    Value: !GetAtt SilverLambdaFunction.Arn

  LambdaRoleArn:
    Description: "ARN of the IAM role used by Lambda functions"
    Value: !GetAtt LoanETLRole.Arn

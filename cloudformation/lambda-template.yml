AWSTemplateFormatVersion: "2010-09-09"
Description: "ETL pipeline with Lambda triggers for Bronze → Silver → Gold"

Parameters:
  DataLakeBucketName:
    Type: String
    Description: "Name of the existing S3 data lake bucket"

Resources:
  # ---- IAM Role for ETL Lambdas ----
  LoanETLRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LoanETLRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${DataLakeBucketName}
                  - !Sub arn:aws:s3:::${DataLakeBucketName}/*

  # ---- Bronze Lambda ----
  BronzeLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "lambda_transform_bronze_to_silver"
      Handler: lambda-function.handler
      Runtime: python3.9
      Timeout: 120
      Role: !GetAtt LoanETLRole.Arn
      Code:
        S3Bucket: !Ref DataLakeBucketName
        S3Key: code/lambda_transform_bronze_to_silver.zip
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataLakeBucketName
          INPUT_PREFIX: data/bronze/
          OUTPUT_PREFIX: data/silver/
      Layers:
        - arn:aws:lambda:eu-west-2:336392948345:layer:AWSSDKPandas-Python39:31

  # ---- Silver Lambda ----
  SilverLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "lambda_transform_silver_to_gold"
      Handler: lambda-function.handler
      Runtime: python3.9
      Timeout: 120
      Role: !GetAtt LoanETLRole.Arn
      Code:
        S3Bucket: !Ref DataLakeBucketName
        S3Key: code/lambda_transform_silver_to_gold.zip
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataLakeBucketName
          INPUT_PREFIX: data/silver/
          OUTPUT_PREFIX: data/gold/
      Layers:
        - arn:aws:lambda:eu-west-2:336392948345:layer:AWSSDKPandas-Python39:31

  # ---- Permissions for S3 to invoke Lambdas ----
  BronzeInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BronzeLambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "s3.amazonaws.com"
      SourceArn: !Sub "arn:aws:s3:::${DataLakeBucketName}"

  SilverInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SilverLambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "s3.amazonaws.com"
      SourceArn: !Sub "arn:aws:s3:::${DataLakeBucketName}"

  # ---- Custom Lambda to attach S3 triggers to existing bucket ----
  S3TriggerSetterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "s3-trigger-setter"
      Handler: index.handler
      Runtime: python3.9
      Timeout: 60
      Role: !GetAtt LoanETLRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              try:
                  s3 = boto3.client('s3')
                  bucket = event['ResourceProperties']['BucketName']
                  bronze_lambda = event['ResourceProperties']['BronzeLambdaArn']
                  silver_lambda = event['ResourceProperties']['SilverLambdaArn']
                  s3.put_bucket_notification_configuration(
                      Bucket=bucket,
                      NotificationConfiguration={
                          'LambdaFunctionConfigurations': [
                              {
                                  'LambdaFunctionArn': bronze_lambda,
                                  'Events': ['s3:ObjectCreated:*'],
                                  'Filter': {'Key': {'FilterRules':[{'Name':'prefix','Value':'data/bronze/'}]}}
                              },
                              {
                                  'LambdaFunctionArn': silver_lambda,
                                  'Events': ['s3:ObjectCreated:*'],
                                  'Filter': {'Key': {'FilterRules':[{'Name':'prefix','Value':'data/silver/'}]}}
                              }
                          ]
                      }
                  )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  # ---- Custom Resource to trigger S3 trigger Lambda ----
  S3TriggerSetterResource:
    Type: Custom::S3TriggerSetter
    Properties:
      ServiceToken: !GetAtt S3TriggerSetterFunction.Arn
      BucketName: !Ref DataLakeBucketName
      BronzeLambdaArn: !GetAtt BronzeLambdaFunction.Arn
      SilverLambdaArn: !GetAtt SilverLambdaFunction.Arn

Outputs:
  BronzeLambdaArn:
    Description: "ARN of Bronze Lambda Function"
    Value: !GetAtt BronzeLambdaFunction.Arn

  SilverLambdaArn:
    Description: "ARN of Silver Lambda Function"
    Value: !GetAtt SilverLambdaFunction.Arn

  LambdaRoleArn:
    Description: "ARN of the IAM role used by Lambda functions"
    Value: !GetAtt LoanETLRole.Arn

AWSTemplateFormatVersion: "2010-09-09"
Description: "Lambda functions for ETL pipeline triggered by S3 uploads"

Parameters:
  DataLakeBucketName:
    Type: String
    Description: "Name of the existing S3 data lake bucket"
    Default: !ImportValue DataLakeBucketName

Resources:
  # ---- Bronze Lambda ----
  BronzeLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "bronze-transform-lambda"
      Handler: index.handler
      Runtime: python3.9
      Timeout: 60
      Role: arn:aws:iam::<ACCOUNT_ID>:role/<YOUR_LAMBDA_ROLE>
      Code:
        S3Bucket: !Ref DataLakeBucketName
        S3Key: lambda/bronze.zip

  # ---- Silver Lambda ----
  SilverLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "silver-transform-lambda"
      Handler: index.handler
      Runtime: python3.9
      Timeout: 60
      Role: arn:aws:iam::<ACCOUNT_ID>:role/<YOUR_LAMBDA_ROLE>
      Code:
        S3Bucket: !Ref DataLakeBucketName
        S3Key: lambda/silver.zip

  # ---- Permissions for S3 to invoke Lambdas ----
  BronzeInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BronzeLambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "s3.amazonaws.com"
      SourceArn: !Sub "arn:aws:s3:::${DataLakeBucketName}"

  SilverInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SilverLambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "s3.amazonaws.com"
      SourceArn: !Sub "arn:aws:s3:::${DataLakeBucketName}"

  # ---- S3 Bucket Notification Configuration ----
  S3BucketNotification:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DataLakeBucketName
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectCreated:*"
            Filter:
              S3Key:
                Rules:
                  - Name: "prefix"
                    Value: "bronze/"
            Function: !GetAtt BronzeLambdaFunction.Arn
          - Event: "s3:ObjectCreated:*"
            Filter:
              S3Key:
                Rules:
                  - Name: "prefix"
                    Value: "silver/"
            Function: !GetAtt SilverLambdaFunction.Arn

Outputs:
  BronzeLambdaArn:
    Description: "ARN of Bronze Lambda Function"
    Value: !GetAtt BronzeLambdaFunction.Arn

  SilverLambdaArn:
    Description: "ARN of Silver Lambda Function"
    Value: !GetAtt SilverLambdaFunction.Arn

AWSTemplateFormatVersion: "2010-09-09"
Description: "Lambda functions for ETL pipeline"

Parameters:
  BronzePrefix:
    Type: String
    Default: "bronze/"
  SilverPrefix:
    Type: String
    Default: "silver/"

Resources:
  # Import S3 bucket name from S3 stack
  DataLakeBucketName:
    Value: !ImportValue DataLakeBucketName

  LambdaBronze:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "bronze-transform-lambda"
      Handler: index.handler
      Role: arn:aws:iam::<ACCOUNT_ID>:role/<YOUR_LAMBDA_ROLE>
      Runtime: python3.9
      Code:
        S3Bucket: !ImportValue DataLakeBucketName
        S3Key: lambda/bronze.zip
      Timeout: 60

  LambdaSilver:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "silver-transform-lambda"
      Handler: index.handler
      Role: arn:aws:iam::<ACCOUNT_ID>:role/<YOUR_LAMBDA_ROLE>
      Runtime: python3.9
      Code:
        S3Bucket: !ImportValue DataLakeBucketName
        S3Key: lambda/silver.zip
      Timeout: 60

  # Grant permissions for S3 to invoke these Lambdas
  BronzeInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaBronze
      Action: "lambda:InvokeFunction"
      Principal: "s3.amazonaws.com"
      SourceArn: !Sub "arn:aws:s3:::${DataLakeBucketName}"

  SilverInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaSilver
      Action: "lambda:InvokeFunction"
      Principal: "s3.amazonaws.com"
      SourceArn: !Sub "arn:aws:s3:::${DataLakeBucketName}"

Outputs:
  LambdaBronzeArn:
    Value: !GetAtt LambdaBronze.Arn
  LambdaSilverArn:
    Value: !GetAtt LambdaSilver.Arn

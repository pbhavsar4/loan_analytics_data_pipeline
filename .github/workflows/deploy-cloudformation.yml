name: Deploy ETL Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "cloudformation/**"   # run only if CloudFormation files change
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-west-2
      LAMBDA_STACK_NAME: loan-etl-lambda
      LOCAL_LAMBDA_CODE_PATH: pipeline/  # your lambda folder path
      DATA_LAKE_BUCKET: loan-analysis-datalake-main  # fixed bucket name

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Ensure S3 bucket exists
      - name: Ensure S3 bucket exists
        id: ensure_bucket
        run: |
          BUCKET_NAME=${{ env.DATA_LAKE_BUCKET }}
          if aws s3api head-bucket --bucket $BUCKET_NAME 2>/dev/null; then
            echo "Bucket $BUCKET_NAME already exists."
          else
            echo "Bucket $BUCKET_NAME does not exist. Creating..."
            aws s3api create-bucket \
              --bucket $BUCKET_NAME \
              --region $AWS_REGION \
              --create-bucket-configuration LocationConstraint=$AWS_REGION
            echo "Bucket $BUCKET_NAME created."
          fi
          echo "bucket=$BUCKET_NAME" >> $GITHUB_OUTPUT

      # 4️⃣ Zip and upload Lambda code to /code folder in the S3 bucket
      - name: Zip and upload Lambda code to S3
        run: |
          BUCKET=${{ steps.ensure_bucket.outputs.bucket }}

          # Zip Bronze Lambda
          cd ${{ env.LOCAL_LAMBDA_CODE_PATH }}
          zip -r ../lambda_transform_bronze_to_silver.zip pipelne/lambda_transform_bronze_to_silver/*
          cd ..
          aws s3 cp lambda_transform_bronze_to_silver.zip s3://$BUCKET/code/
          echo "✅ Uploaded Bronze Lambda code to s3://$BUCKET/code/"

          # Zip Silver Lambda
          cd ${{ env.LOCAL_LAMBDA_CODE_PATH }}
          zip -r ../lambda_transform_silver_to_gold.zip pipeline/lambda_transform_silver_to_gold/*
          cd ..
          aws s3 cp lambda_transform_silver_to_gold.zip s3://$BUCKET/code/
          echo "✅ Uploaded Silver Lambda code to s3://$BUCKET/code/"

      # 5️⃣ Package the Lambda CloudFormation template
      - name: Package Lambda CloudFormation template
        run: |
          aws cloudformation package \
            --template-file cloudformation/lambda-template.yml \
            --s3-bucket ${{ steps.ensure_bucket.outputs.bucket }} \
            --output-template-file cloudformation/packaged-template.yml

      # 6️⃣ Deploy the Lambda stack
      - name: Deploy Lambda CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/packaged-template.yml \
            --stack-name $LAMBDA_STACK_NAME \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides DataLakeBucketName=${{ steps.ensure_bucket.outputs.bucket }}

      # 7️⃣ Verification step (optional)
      - name: List Lambda functions
        run: |
          aws lambda list-functions --region $AWS_REGION

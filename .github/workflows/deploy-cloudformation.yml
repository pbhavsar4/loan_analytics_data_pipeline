name: Deploy ETL Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-west-2
      S3_STACK_NAME: loan-s3-stack
      LAMBDA_STACK_NAME: loan-lambda-stack
      S3_BUCKET: loan-analysis-datalake-eu-west2

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Deploy the S3 stack first
      - name: Deploy S3 CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/s3-template.yaml \
            --stack-name $S3_STACK_NAME \
            --capabilities CAPABILITY_NAMED_IAM \
            --region $AWS_REGION

      # 4️⃣ Package and deploy the Lambda stack
      - name: Package and deploy Lambda stack
        run: |
          aws cloudformation package \
            --template-file cloudformation/lambda-template.yaml \
            --s3-bucket $S3_BUCKET \
            --output-template-file cloudformation/packaged-lambda.yaml

          aws cloudformation deploy \
            --template-file cloudformation/packaged-lambda.yaml \
            --stack-name $LAMBDA_STACK_NAME \
            --capabilities CAPABILITY_NAMED_IAM \
            --region $AWS_REGION

      # 5️⃣ Verify Lambda and stack deployment
      - name: Verify deployment
        run: |
          echo "Listing Lambda functions:"
          aws lambda list-functions --region $AWS_REGION

          echo "Listing CloudFormation stacks:"
          aws cloudformation list-stacks --region $AWS_REGION

name: Glue ETL CI/CD

on:
  push:
    branches:
      - main   # triggers on push to main branch

jobs:
  deploy-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Upload Glue script to S3
        run: |
          aws s3 cp loan_payment.ipynb s3://aws-glue-assets-816069169041-eu-west-2/scripts/

      - name: Update Glue job
        run: |
          aws glue update-job \
            --job-name financial-etl-job \
            --job-update '{
              "Role": "AWSGlueServiceRole",
              "Command": {
                "Name": "glueetl",
                "ScriptLocation": "s3://aws-glue-assets-816069169041-eu-west-2/scripts/glue_job.py",
                "PythonVersion": "3"
              }
            }'

      - name: Start Glue job
        run: |
          aws glue start-job-run --job-name financial-etl-job

AWSTemplateFormatVersion: "2010-09-09"
Description: Simple Redshift Serverless Namespace and Workgroup using default VPC

Parameters:
  RedshiftNamespaceName:
    Type: String
    Default: my-redshift-namespace
    Description: Name of the Redshift Serverless namespace

  RedshiftDBName:
    Type: String
    Default: analyticsdb
    Description: Default database name

  RedshiftWorkgroupName:
    Type: String
    Default: my-redshift-workgroup
    Description: Name of the Redshift Serverless workgroup

Resources:

  # -------------------------
  # IAM Role for Redshift S3 access
  # -------------------------
  RedshiftS3Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-RedshiftS3Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: redshift-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  # -------------------------
  # Redshift Serverless Namespace
  # -------------------------
  RedshiftNamespace:
    Type: AWS::RedshiftServerless::Namespace
    Properties:
      NamespaceName: !Ref RedshiftNamespaceName
      DbName: !Ref RedshiftDBName
      AdminUsername: adminuser
      AdminUserPassword: !Sub "${AWS::StackName}-RedshiftPassword123"
      DefaultIamRoleArn: !GetAtt RedshiftS3Role.Arn
      IamRoles:
        - !GetAtt RedshiftS3Role.Arn
      Tags:
        - Key: Environment
          Value: Production


  # -------------------------
  # Redshift Serverless Workgroup
  # -------------------------
  RedshiftWorkgroup:
    Type: AWS::RedshiftServerless::Workgroup
    DependsOn: RedshiftNamespace
    Properties:
      WorkgroupName: !Ref RedshiftWorkgroupName
      NamespaceName: !Ref RedshiftNamespaceName
      BaseCapacity: 16
      PubliclyAccessible: true  # default VPC allows public access
      Tags:
        - Key: Environment
          Value: Production

Outputs:
  RedshiftNamespaceName:
    Description: Redshift Serverless namespace
    Value: !Ref RedshiftNamespace

  RedshiftWorkgroupName:
    Description: Redshift Serverless workgroup
    Value: !Ref RedshiftWorkgroup

  RedshiftS3RoleArn:
    Description: ARN of the IAM role used by Redshift
    Value: !GetAtt RedshiftS3Role.Arn

AWSTemplateFormatVersion: "2010-09-09"
Description: S3 Datalake Bucket and IAM Role for AWS Glue access

Parameters:
  BucketName:
    Type: String
    Default: "loan-analysis-git-app-datalake-eu-west2"
    Description: Name of the S3 data lake bucket

  CreateS3Bucket:
    Type: String
    Default: "Yes"
    AllowedValues: ["Yes", "No"]
    Description: Whether to create the S3 data lake bucket

  CreateGlueRole:
    Type: String
    Default: "Yes"
    AllowedValues: ["Yes", "No"]
    Description: Whether to create the IAM role for Glue

Conditions:
  CreateBucketCondition: !Equals [!Ref CreateS3Bucket, "Yes"]
  CreateGlueRoleCondition: !Equals [!Ref CreateGlueRole, "Yes"]

Resources:

  # -------------------------
  # S3 Data Lake Bucket (Optional)
  # -------------------------
  DataLakeBucket:
    Type: AWS::S3::Bucket
    Condition: CreateBucketCondition
    Properties:
      BucketName: !Ref BucketName

  # -------------------------
  # IAM Role for Glue (Optional)
  # -------------------------
  GlueRole:
    Type: AWS::IAM::Role
    Condition: CreateGlueRoleCondition
    DeletionPolicy: Retain
    Properties:
      RoleName: "GlueDatalakeRole-git"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole

  # -------------------------
  # S3 Access Policy for Glue Role
  # -------------------------
  GlueS3AccessPolicy:
    Type: AWS::IAM::Policy
    Condition: CreateGlueRoleCondition
    Properties:
      PolicyName: "GlueDatalakeS3Access"
      Roles:
        - !Ref GlueRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::${BucketName}
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource:
              - !Sub arn:aws:s3:::${BucketName}/*

Outputs:
  DataLakeBucketName:
    Condition: CreateBucketCondition
    Description: The name of the S3 bucket created
    Value: !Ref DataLakeBucket

  GlueRoleArn:
    Condition: CreateGlueRoleCondition
    Description: IAM Role ARN for Glue access
    Value: !GetAtt GlueRole.Arn
